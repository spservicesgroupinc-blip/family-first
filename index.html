    <style>
      /* Custom scrollbar for legal documents */
      .legal-scroll::-webkit-scrollbar {
        width: 8px;
      }
      .legal-scroll::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .legal-scroll::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }
      .legal-scroll::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 8px); }
      .pt-safe { padding-top: env(safe-area-inset-top, 0); }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Mobile improvements */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      button, input, select, textarea, label {
        min-height: 44px;
      }
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      /* Improve touch targets */
      @media (max-width: 768px) {
        button, [role="button"], a {
          min-height: 44px;
          min-width: 44px;
        }
      }
